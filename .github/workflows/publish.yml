# Publishes via npm trusted publishing (OIDC). Configure the publisher on npmjs.com
# (package → Access → Trusted Publisher): repo belopash/squid-typeorm-store, workflow publish.yml.
name: publish
on:
  workflow_dispatch: # manually run
    inputs:
      releaseTag:
        description: 'Tag the release (next, latest)'
        required: false
        default: 'latest'

env:
  CI: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: defaultdb
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
        ports:
          - 27436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package
        run: |
          npm pack --dry-run
          npm run test

      - name: Publish to npm
        run: npm publish --provenance --tag ${{ github.event.inputs.releaseTag }} --access public
