# Publishes via npm trusted publishing (OIDC). Configure the publisher on npmjs.com
# (package → Access → Trusted Publisher): repo belopash/squid-typeorm-store, workflow publish.yml.
# Requires Node ≥22.14 and npm ≥11.5.1. Remove NPM_AUTH_TOKEN after verifying a successful run.
name: publish
on:
  workflow_dispatch: # manually run
    inputs:
      releaseTag:
        description: 'Tag the release (next, latest)'
        required: false
        default: 'latest'

env:
  CI: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install npm (trusted publishing)
        run: npm install -g npm@^11.5.1

      - name: Configure git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package
        run: |
          npm pack --dry-run
          npm run test

      # OIDC auth is automatic on GitHub-hosted runners; provenance is added by the registry.
      - name: Publish to npm
        run: npm publish --tag ${{ github.event.inputs.releaseTag }} --access public
